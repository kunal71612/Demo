<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SmileCraft Dental Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M20 30C20 15 35 10 50 25C65 10 80 15 80 30C80 55 70 65 65 85C63 90 55 90 50 85C45 90 37 90 35 85C30 65 20 55 20 30Z' fill='%23d1b075'/%3E%3Cpath d='M72 18L75 10L78 18L86 21L78 24L75 32L72 24L64 21L72 18Z' fill='%23d1b075'/%3E%3C/svg%3E">
</head>
<body class="admin-login-body">
    
    <div class="admin-login-wrapper">
        <div class="admin-login-logo">
            <div class="logo">
                <span class="logo-symbol">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 22px; height: 22px; vertical-align: middle;">
                        <path d="M20 30C20 15 35 10 50 25C65 10 80 15 80 30C80 55 70 65 65 85C63 90 55 90 50 85C45 90 37 90 35 85C30 65 20 55 20 30Z" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="8" stroke-linejoin="round"/>
                        <path d="M72 18L75 10L78 18L86 21L78 24L75 32L72 24L64 21L72 18Z" fill="currentColor"/>
                    </svg>
                </span>
                Smile<span>Craft</span>
            </div>
        </div>
        
        <h2 class="admin-login-title">Admin Portal</h2>
        <p class="admin-login-desc">Sign in to manage patient appointments</p>
        
        {% if error %}
        <div class="alert">
            <i data-lucide="alert-circle" style="width: 16px; height: 16px; margin-right: 5px; vertical-align: middle;"></i>
            {{ error }}
        </div>
        {% endif %}
        
        <form action="{{ url_for('admin_login') }}" method="POST" class="booking-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-rounded" style="width: 100%;">Secure Login</button>
        </form>
        
        <div style="text-align: center; margin-top: 2rem;">
            <a href="{{ url_for('index') }}" class="service-link" style="font-size: 0.85rem;">
                <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Return to Website
            </a>
        </div>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
